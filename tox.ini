[tox]
isolated_build = True
envlist =
    py{311,312}-django{42}
    py{311,312}-django{50}
    py{311,312,313}-django{51}
    flake8
    coverage

[gh-actions]
python =
    3.11: py311
    3.12: py312
    3.13: py313

[testenv]
setenv =
    PYTHONDONTWRITEBYTECODE=1
    DJANGO_SETTINGS_MODULE=tests.settings
basepython =
    py311: python3.11
    py312: python3.12
    py313: python3.13
    .package: python3
deps =
    django42: Django>=4.2,<5.0
    django50: Django>=5.0,<5.1
    django51: Django>=5.1,<5.2
allowlist_externals = poetry
commands =
    poetry install -v
    poetry run pytest tests/

[testenv:flake8]
basepython =
    python3.12
commands =
    poetry install -v
    poetry run flake8 src

[testenv:coverage]
basepython =
    python3.12
commands =
    poetry install -v
    poetry run pytest --cov=django_scim --cov-report=xml --cov-report=term
